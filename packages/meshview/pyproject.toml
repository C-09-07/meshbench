[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[project]
name = "meshview"
version = "0.1.0"
description = "Interactive Three.js mesh quality viewer"
requires-python = ">=3.11"
license = "MIT"
dependencies = ["meshbench", "trimesh>=4.0", "numpy>=1.26"]

[tool.uv.sources]
meshbench = { workspace = true }

[tool.hatch.build.targets.wheel]
packages = ["src/meshview"]
